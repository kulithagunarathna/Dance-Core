name: Deploy Vite to GitHub Pages

on:
  push:
    branches:
      - main # This workflow will run when you push to the 'main' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # The type of virtual machine to run the job on

    steps:
      - name: Checkout repository # Step to get your code from the repository
        uses: actions/checkout@v4

      - name: Setup Node.js # Step to set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Specify the Node.js version. Adjust if your project needs a different one (e.g., '20')
          cache: 'npm' # Cache npm dependencies for faster builds. Use 'yarn' if you use yarn.

      - name: Install dependencies # Step to install your project's npm dependencies
        run: npm install # Or use 'yarn install' if you use yarn

      - name: Build project # Step to build your Vite project for production
        run: npm run build # This command runs the 'build' script defined in your package.json (usually creates a 'dist' folder)

      - name: Deploy to GitHub Pages # Step to deploy the built project to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # Uses a popular action for deploying to GitHub Pages
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # GitHub's default token for authentication
          publish_dir: ./dist # Crucial: This tells the action to publish the contents of your 'dist' folder
          # Uncomment the line below if you are using a custom domain for your GitHub Pages site
          # cname: your-custom-domain.com
